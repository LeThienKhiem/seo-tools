# Force Node 22+ on Railway because we use the built-in `node:sqlite` module
# (stable in Node 22.5+ with --experimental-sqlite, no flag from Node 23+)

[phases.setup]
nixPkgs = ['nodejs_22', 'npm-9_x']

[phases.install]
cmds = ['npm ci']

[phases.build]
cmds = ['npm run build']

[start]
cmd = 'node --experimental-sqlite node_modules/next/dist/bin/next start'

[variables]
NODE_ENV = 'production'
